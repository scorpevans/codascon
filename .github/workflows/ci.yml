name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --run

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Pack packages
        run: |
          (cd packages/codascon && pnpm pack --pack-destination /tmp)
          (cd packages/odetovibe && pnpm pack --pack-destination /tmp)

      - name: Smoke test — codascon
        run: |
          mkdir -p /tmp/smoke-codascon
          cd /tmp/smoke-codascon
          npm init -y
          npm install /tmp/codascon-*.tgz
          node --input-type=module -e "import { Subject, Command } from 'codascon'; console.log('ESM: OK')"
          node -e "const { Subject, Command } = require('codascon'); console.log('CJS: OK')"

      - name: Consumer type-check — codascon
        run: |
          cd /tmp/smoke-codascon
          npm install --save-dev typescript
          cat > consumer.ts << 'TSEOF'
          import {
            Subject, Command, Template,
            CommandSubjectUnion, CommandObject, CommandReturn,
            SubjectVisitName, CommandName,
          } from "codascon";
          class Foo extends Subject { readonly visitName = "resolveFoo" as const; }
          class Bar extends Subject { readonly visitName = "resolveBar" as const; }
          interface Item {}
          interface Result {}
          class ProcessCmd extends Command<object, Item, Result, [Foo, Bar]> {
            readonly commandName = "process" as const;
            resolveFoo(s: Foo, o: Readonly<Item>): Template<ProcessCmd, [], Foo> { throw new Error(); }
            resolveBar(s: Bar, o: Readonly<Item>): Template<ProcessCmd, [], Bar> { throw new Error(); }
          }
          class FooProcessor implements Template<ProcessCmd, [], Foo> {
            execute(s: Foo, o: Item): Result { return {}; }
          }
          type _SU = CommandSubjectUnion<ProcessCmd>;
          type _O  = CommandObject<ProcessCmd>;
          type _R  = CommandReturn<ProcessCmd>;
          type _VN = SubjectVisitName<Foo>;
          type _CN = CommandName<ProcessCmd>;
          TSEOF
          echo '{"compilerOptions":{"strict":true,"module":"esnext","moduleResolution":"bundler","target":"es2022","noEmit":true}}' > tsconfig.json
          npx tsc --noEmit
          echo "Consumer type-check: OK"

      - name: Smoke test — odetovibe
        run: |
          mkdir -p /tmp/smoke-odetovibe
          cd /tmp/smoke-odetovibe
          npm init -y
          npm install /tmp/codascon-*.tgz /tmp/odetovibe-*.tgz
          node --input-type=module -e "import { parseYaml, validateYaml, emitAst, writeFiles } from 'odetovibe'; console.log('ESM: OK')"
          test -x ./node_modules/.bin/odetovibe && echo "CLI binary: OK"

          # --help must exit 0 and mention the positional arg
          ./node_modules/.bin/odetovibe --help | grep -q "code_config.yaml" && echo "CLI --help: OK"

          # End-to-end: convert smoke.yaml and diff output against golden files
          smoke_yaml="${GITHUB_WORKSPACE}/packages/odetovibe/fixtures/smoke.yaml"
          smoke_expected="${GITHUB_WORKSPACE}/packages/odetovibe/fixtures/smoke-expected"
          output=$(./node_modules/.bin/odetovibe "$smoke_yaml" --out /tmp/smoke-out 2>&1)
          echo "$output"
          echo "$output" | grep -q "Parsed 1 command(s), namespace: greet" && echo "CLI codegen parse: OK"
          diff -r "$smoke_expected" /tmp/smoke-out && echo "CLI codegen output matches golden files: OK"
