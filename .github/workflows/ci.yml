name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --run

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Pack packages
        run: |
          (cd packages/codascon && pnpm pack --pack-destination /tmp)
          (cd packages/odetovibe && pnpm pack --pack-destination /tmp)

      - name: Smoke test — codascon
        run: |
          mkdir -p /tmp/smoke-codascon
          cd /tmp/smoke-codascon
          npm init -y
          npm install /tmp/codascon-*.tgz
          node --input-type=module -e "import { Subject, Command } from 'codascon'; console.log('ESM: OK')"
          node -e "const { Subject, Command } = require('codascon'); console.log('CJS: OK')"

      - name: Smoke test — odetovibe
        run: |
          mkdir -p /tmp/smoke-odetovibe
          cd /tmp/smoke-odetovibe
          npm init -y
          npm install /tmp/codascon-*.tgz /tmp/odetovibe-*.tgz
          node --input-type=module -e "import { parseYaml, validateYaml, emitAst, writeFiles } from 'odetovibe'; console.log('ESM: OK')"
          test -x ./node_modules/.bin/odetovibe && echo "CLI binary: OK"
