# ═══════════════════════════════════════════════════════════════════
# odetovibe — Extract Domain
#
# Responsible for:
#   1. Parsing a YAML config file into a typed ConfigIndex (parseYaml)
#   2. Validating all entries against schema rules (validateYaml)
#
# Domain types with `visitName` are split into SubjectTypeEntry at
# parse time; types without become PlainTypeEntry. Templates are
# similarly split: non-empty strategies → AbstractTemplateEntry,
# empty strategies → ConcreteTemplateEntry. This ensures the
# ValidateEntryCommand dispatches structurally with no runtime branching.
#
# Public API exposed to clients:
#   - parseYaml(yamlPath: string): ConfigIndex
#   - validateYaml(configIndex: ConfigIndex): ExtractResult
# ═══════════════════════════════════════════════════════════════════

namespace: extract

imports:
  "../schema.js":
    - DomainType
    - Command
    - Template
    - Strategy

domainTypes:
  # ── Base type ───────────────────────────────────────────────────
  ConfigEntry:

  # ── Subjects ────────────────────────────────────────────────────
  SubjectTypeEntry:
    visitName: resolveSubjectType

  PlainTypeEntry:
    visitName: resolvePlainType

  CommandEntry:
    visitName: resolveCommand

  AbstractTemplateEntry:
    visitName: resolveAbstractTemplate

  ConcreteTemplateEntry:
    visitName: resolveConcreteTemplate

  StrategyEntry:
    visitName: resolveStrategy

  # ── Object type ─────────────────────────────────────────────────
  ConfigIndex:

  # ── Return types ────────────────────────────────────────────────
  ValidationError:

  ValidationResult:

  ExtractResult:

commands:
  ValidateEntryCommand:
    commandName: validateEntry
    baseType: ConfigEntry
    objectType: ConfigIndex
    returnType: ValidationResult
    subjectUnion:
      - SubjectTypeEntry
      - PlainTypeEntry
      - CommandEntry
      - AbstractTemplateEntry
      - ConcreteTemplateEntry
      - StrategyEntry
    dispatch:
      SubjectTypeEntry: SubjectTypeValidator
      PlainTypeEntry: PlainTypeValidator
      CommandEntry: CommandValidator
      AbstractTemplateEntry: AbstractTemplateValidator
      ConcreteTemplateEntry: ConcreteTemplateValidator
      StrategyEntry: StrategyValidator
    templates:
      # Checks visitName prefix ("resolve") and uniqueness across subjectTypes
      SubjectTypeValidator:
        isParameterized: false
        subjectSubset: [SubjectTypeEntry]
        strategies: {}

      # Plain types have no visitName — no structural constraints
      PlainTypeValidator:
        isParameterized: false
        subjectSubset: [PlainTypeEntry]
        strategies: {}

      # Checks type refs, subjectUnion validity, dispatch coverage and targets
      CommandValidator:
        isParameterized: false
        subjectSubset: [CommandEntry]
        strategies: {}

      # Checks subjectSubset, commandHooks, and that it is not in dispatch directly
      AbstractTemplateValidator:
        isParameterized: false
        subjectSubset: [AbstractTemplateEntry]
        strategies: {}

      # Checks subjectSubset and commandHooks (may appear directly in dispatch)
      ConcreteTemplateValidator:
        isParameterized: false
        subjectSubset: [ConcreteTemplateEntry]
        strategies: {}

      # Checks parent AbstractTemplateEntry, subjectSubset, commandHooks subset
      StrategyValidator:
        isParameterized: false
        subjectSubset: [StrategyEntry]
        strategies: {}
