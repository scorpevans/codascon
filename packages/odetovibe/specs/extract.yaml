# ═══════════════════════════════════════════════════════════════════
# odetovibe — Extract Domain
#
# Responsible for:
#   1. Parsing a YAML config file into a typed ConfigIndex (parseYaml)
#   2. Validating all entries against schema rules (validateYaml)
#
# Domain types with `resolverName` are split into SubjectTypeEntry at
# parse time; types without become PlainTypeEntry. Templates always
# become AbstractTemplateEntry entries (all templates are abstract).
# This ensures the ValidateEntryCommand dispatches structurally with
# no runtime branching.
#
# Public API exposed to clients:
#   - parseYaml(yamlPath: string): ConfigIndex
#   - validateYaml(configIndex: ConfigIndex): ExtractResult
# ═══════════════════════════════════════════════════════════════════

namespace: extract

imports:
  "../schema.js":
    - DomainType
    - Command
    - Template
    - Strategy

domainTypes:
  # ── Base type ───────────────────────────────────────────────────
  ConfigEntry:

  # ── Subjects ────────────────────────────────────────────────────
  SubjectTypeEntry:
    resolverName: resolveSubjectType

  PlainTypeEntry:
    resolverName: resolvePlainType

  CommandEntry:
    resolverName: resolveCommand

  AbstractTemplateEntry:
    resolverName: resolveAbstractTemplate

  StrategyEntry:
    resolverName: resolveStrategy

  # ── Object type ─────────────────────────────────────────────────
  ConfigIndex:

  # ── Return types ────────────────────────────────────────────────
  ValidationError:

  ValidationResult:

  ExtractResult:

commands:
  ValidateEntryCommand:
    commandName: validateEntry
    baseType: ConfigEntry
    objectType: ConfigIndex
    returnType: ValidationResult
    subjectUnion:
      - SubjectTypeEntry
      - PlainTypeEntry
      - CommandEntry
      - AbstractTemplateEntry
      - StrategyEntry
    dispatch:
      SubjectTypeEntry: SubjectTypeValidatorDefault
      PlainTypeEntry: PlainTypeValidatorDefault
      CommandEntry: CommandValidatorDefault
      AbstractTemplateEntry: AbstractTemplateValidatorDefault
      StrategyEntry: StrategyValidatorDefault
    templates:
      # Checks resolverName prefix ("resolve") and uniqueness across subjectTypes
      SubjectTypeValidator:
        isParameterized: false
        subjectSubset: [SubjectTypeEntry]
        strategies:
          SubjectTypeValidatorDefault: {}

      # Plain types have no resolverName — no structural constraints
      PlainTypeValidator:
        isParameterized: false
        subjectSubset: [PlainTypeEntry]
        strategies:
          PlainTypeValidatorDefault: {}

      # Checks type refs, subjectUnion validity, dispatch coverage and targets
      CommandValidator:
        isParameterized: false
        subjectSubset: [CommandEntry]
        strategies:
          CommandValidatorDefault: {}

      # Checks subjectSubset, commandHooks, and that it is not in dispatch directly
      AbstractTemplateValidator:
        isParameterized: false
        subjectSubset: [AbstractTemplateEntry]
        strategies:
          AbstractTemplateValidatorDefault: {}

      # Checks parent AbstractTemplateEntry, subjectSubset, commandHooks subset
      StrategyValidator:
        isParameterized: false
        subjectSubset: [StrategyEntry]
        strategies:
          StrategyValidatorDefault: {}
