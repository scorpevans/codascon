namespace: greet

domainTypes:
  Person:
  User:
    resolverName: resolveUser
  Guest:
    resolverName: resolveGuest
  Greeting:

commands:
  GreetCommand:
    commandName: greet
    baseType: Person
    objectType: Greeting
    returnType: Greeting
    returnAsync: True
    resolvers:
      User: [UserGreeterCasual, UserGreeterFormal]
    templates:
      UserGreeter:
        isParameterized: false
        subjectSubset: [User]
        strategies:
          UserGreeterCasual: {}
          UserGreeterFormal: {}

  FarewellCommand:
    commandName: farewell
    baseType: Person
    objectType: Greeting
    returnType: Greeting
    resolvers:
      User: UserFarewellDefault
    defaultSubjects:
      - Guest
    defaultResolver: GuestFarewellDefault
    templates:
      UserFarewell:
        isParameterized: false
        subjectSubset: [User]
        strategies:
          UserFarewellDefault: {}
      GuestFarewell:
        isParameterized: false
        strategies:
          GuestFarewellDefault: {}
